  - EFF-030
  - ENG-004
  - ENG-006
  - ENG-014
acceptance_criteria:
  - "processEffectQueue has no early return inside the loop except: game ends, unrecoverable error, or pending decision (04-effect-runtime.s010)."
  - "After each executeEffectBlock, rule-processing checkpoint is invoked and its events are appended (04-effect-runtime.s010)."
  - "Triggers are detected from the effect resolution event batch and enqueued per timing rules (04-effect-runtime.s008, 04-effect-runtime.s010)."
  - "If canQueuedEffectResolve fails, the entry is cancelled and emits cancellation events, and processing continues (04-effect-runtime.s010)."
required_tests:
  - "Unit: queue processing continues after cancellation and processes remaining entries deterministically."
  - "Unit: when executeEffectBlock returns a PendingDecision pause, processEffectQueue returns paused state and does not dequeue further entries."
  - "Golden: event batches produced by queue processing are stable across runs given same input state and decisions."
repo_rules:
  - "Trigger detection must consume EngineEvents emitted by atomic mutations, not a single lastAction field (00-project-overview.s012)."
