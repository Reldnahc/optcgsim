title: Implement effect queue processing loop with pause/cancel/resolve and trigger detection from events
type: implementation
area: engine
priority: critical
status: generated
summary: >
  Implement processEffectQueue() per spec: dequeue/mark resolving, cancel if cannot resolve, execute effect block, rule-processing checkpoint, detect new triggers from resolution events, enqueue with timing rules, and pause on decisions.
spec_refs:
  - 04-effect-runtime.s010 (Queue processing)
  - 04-effect-runtime.s008 (Trigger detection from events)
  - 04-effect-runtime.s016 (Failure policy)
  - 00-project-overview.s012 (Effects are event-driven)
scope:
  - "Implement processEffectQueue(state) loop that continues until queue empty, gameOver, unrecoverable error, or pending decision pauses resolution (04-effect-runtime.s010)."
  - Implement markResolving/markResolved/cancelQueuedEffect state transitions and emitted events for cancel/resolve.
  - "Integrate detectTriggeredEffects(state, events) consumption of event batches (04-effect-runtime.s008) and enqueueTriggeredEffectsRespectingTiming()."
  - Ensure the runtime calls rule-processing checkpoint after each effect resolution with causedBy referencing the effect queue entry (04-effect-runtime.s010).
  - Ensure return includes events and stateHash computed from canonical state at exit (04-effect-runtime.s010).
non_scope:
  - Full DSL interpreter for executeEffectBlock; may stub to no-op until DSL primitives are implemented.
  - Replacement-effect interception loop (separate story).
  - Logging format/transport beyond emitting EngineEvents.
