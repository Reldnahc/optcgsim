  - "Enforce: cards in transient set are not simultaneously in any real zone (04-effect-runtime.s017)."
  - Implement movement from transient set to a real zone emitting cardMoved with appropriate visibility (04-effect-runtime.s017).
  - Implement cleanup policy that runs when an effect exits early before queue continues (04-effect-runtime.s017).
