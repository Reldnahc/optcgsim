acceptance_criteria:
  - Transient sets are not normal zones; cards are not simultaneously in hand/deck/trash/life while in a transient set (04-effect-runtime.s017).
  - "cardMoved events are emitted when moving from transient set to real zone, with correct visibility (04-effect-runtime.s017)."
  - "On early exit, cleanup runs before effect queue continues (04-effect-runtime.s017)."
  - "Milestone 2 item M2-022 passes once reveal primitive is used: opponent PlayerView does not retain card ID after it returns face-down (18-acceptance-tests.s004)."
