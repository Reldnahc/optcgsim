  - "If a last safe state exists, lastSafeStateSeq is included"
  - "If recovery options exist, recoveryOffered is true; otherwise omitted/false"
  - Server does not transition clients to lobby without first emitting MatchErrorMessage
required_tests:
  - "Integration: induce match error -> expect MatchErrorMessage broadcast before disconnect"
