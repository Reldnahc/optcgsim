  - Generate a reportToken that can be used to correlate uploaded report artifacts
  - "Populate lastSafeStateSeq when known (e.g., from last checkpoint)"
  - Set recoveryOffered when the server has a recovery action available for the match
  - Ensure error path preserves match context and does not just disconnect clients without message
non_scope:
  - Client UI implementation for displaying match errors (server-side emission only)
  - Definition of match_lost message contract (handled by existing ambiguity story)
