id: LOB-005
title: Emit MatchErrorMessage to clients on match-level errors with report token; never silently return to lobby
type: implementation
area: server
priority: critical
status: generated
summary: >
  Add server-to-client error messaging for match-level failures using MatchErrorMessage, including reportToken, lastSafeStateSeq, and whether recovery is offered. Ensure clients are not silently dumped to lobby on errors.
spec_refs:
  - 08-replay-rollback-recovery.s028 (Player-facing error event)
  - "18-acceptance-tests.s008 (Milestone 6 - replay, rollback, recovery)"
scope:
