story_schema_version: 1.0.0
id: LOB-006
title: "Custom lobby spectator policy validation: host may choose only disabled or live-filtered for opt-in spectating"
type: implementation
area: server
priority: medium
status: generated
summary: >
  Extend lobby creation/update validation so host-configured spectator policy is
  constrained to the initial allowed modes for opt-in spectating: `disabled`
  and `live-filtered`.
spec_refs:
  - 06-visibility-security.s008 (Spectator modes)
  - 18-acceptance-tests.s010 (Milestone 7 - public unranked alpha and custom lobbies)
scope:
  - "On lobby creation/update, validate requested SpectatorPolicy.mode is either `disabled` or `live-filtered`."
  - Ensure lobby host can opt into spectating only for matches intended to be spectatable.
  - Ensure lobby host can select only allowed spectator policies (M7-003).
non_scope:
  - Defining the exact set of allowed modes per lobby type if not already present in lobby spec (escalate if missing)
  - Delayed spectator modes
  - Post-game hand reveal behavior
  - Implementing spectator UI; only enforce server-side policy gating
dependencies:
  - LOB-001
  - FMT-003
  - SRV-007
  - AMB-007
acceptance_criteria:
  - Attempting to set a disallowed spectator policy mode for a custom lobby is rejected (M7-003)
  - Custom lobbies can opt into `live-filtered` spectating only when explicitly configured to do so
  - Ranked or otherwise non-spectatable matches never become spectatable through this flow
required_tests:
  - "API: create lobby with invalid spectator policy rejected"
  - "API: create lobby with delayed or full-information spectator policy rejected"
  - "Integration: lobby-configured live-filtered policy is applied only to explicitly spectatable matches"
repo_rules:
  - "If allowed modes list is not specified in provided sections, fail_and_escalate rather than guessing"
ambiguity_policy: fail_and_escalate
