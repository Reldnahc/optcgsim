id: FMT-003
title: Implement spectator policy evaluation and filtering modes (live-filtered / delayed-filtered / delayed-full / disabled)
type: implementation
area: server
priority: high
status: generated
summary: >
  Add spectator mode support with policy-driven filtering and delays, ensuring ranked defaults do not expose hidden info and delayed modes satisfy turn/time/min-action constraints.
spec_refs:
  - 06-visibility-security.s008 (Spectator modes)
  - 06-visibility-security.s020 (Original spectator model and v2 hardening)
scope:
  - "Define SpectatorPolicy type and canonical defaults per game context in server config (unranked live-filtered; ranked delayed-filtered with delayTurns=3 plus configured delayMs/minActionDelay)."
  - "Implement spectator subscription projection: produce SpectatorView snapshots according to policy (filtered vs full)."
  - "Implement delay gate logic that requires all configured constraints to pass before releasing a snapshot: delayTurns, delayMs, minActionDelay."
  - "Allow internal buffer to store full snapshots, but ensure emitted spectator snapshots are filtered/released per policy only."
non_scope:
  - Match-server protocol for spectator subscriptions (handled by SRV-002 / SEC-005).
  - UI implementation for spectator viewing in the client.
  - Tournament/broadcast organizer configuration UI.
dependencies:
  - SRV-007
acceptance_criteria:
  - Spectator snapshots for ranked default are delayed-filtered and do not expose hidden info.
  - "Delayed spectator emission requires satisfying all configured constraints (turn delay, wall-clock delay, minimum server-action delay) when present."
  - disabled policy yields no spectator snapshots/stream.
required_tests:
  - "Unit test: delay gate blocks emission until delayTurns AND delayMs AND minActionDelay are satisfied."
  - "Unit test: delayed-full emits full info only after delays; delayed-filtered emits filtered view after delays."
  - "Unit test: live-filtered emits immediately but still filtered."
repo_rules:
  - Prefer conservative filtering; never emit full info unless policy is delayed-full and delays satisfied.
ambiguity_policy: fail_and_escalate
