story_schema_version: 1.0.0
id: FMT-003
title: Implement spectator policy evaluation for opt-in live-filtered matches (disabled / live-filtered)
type: implementation
area: server
priority: high
status: generated
summary: >
  Add initial spectator mode support with policy-driven filtering for
  explicitly spectatable matches only. The first implementation supports
  disabled and live-filtered only; ranked and delayed spectator modes remain
  out of scope.
spec_refs:
  - 06-visibility-security.s008 (Spectator modes)
  - 06-visibility-security.s020 (Original spectator model and v2 hardening)
scope:
  - "Define SpectatorPolicy type and canonical defaults per game context for initial implementation (disabled or live-filtered only)."
  - "Implement spectator subscription projection for explicitly spectatable matches: produce live filtered SpectatorView snapshots only."
  - "Reject spectator subscription when the match policy is disabled."
  - "Ensure spectator payloads use only public filtered state and never require delayed buffering or full-information snapshots."
non_scope:
  - Match-server protocol for spectator subscriptions beyond live filtered payload routing (handled by SRV-002 / SEC-005).
  - UI implementation for spectator viewing in the client.
  - Delayed spectator modes.
  - Ranked spectator support.
  - Tournament/broadcast organizer configuration UI.
dependencies:
  - SRV-007
acceptance_criteria:
  - Spectator snapshots are emitted only for matches with `live-filtered` spectator policy and do not expose hidden info.
  - Ranked matches and any `disabled` policy yield no spectator snapshots/stream.
  - No delayed spectator buffering or release gates exist in the initial implementation.
required_tests:
  - "Unit test: live-filtered emits immediately but still filtered."
  - "Unit test: disabled policy yields no spectator snapshots."
  - "Security test: spectator payload never contains hidden zones, private decision data, or other non-public state."
repo_rules:
  - Prefer conservative filtering; do not implement delayed or full-information spectator delivery in this story.
ambiguity_policy: fail_and_escalate
