summary: >
  Create the shared types package from the canonical contract so IDs, DTOs, views, and action contracts have one compile-checked source of truth.
spec_refs:
  - 15-implementation-kickoff.s002 (v5 kickoff gates)
  - "15-implementation-kickoff.s005 (Step 1 - `@optcg/types`)"
  - 22-v6-implementation-tightening.s006 (2. TypeScript model)
