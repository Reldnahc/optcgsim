spec_version: v6
spec_package_name: optcg-md-specs-v6
story_schema_version: 1.0.0
id: ENG-001
title: Bootstrap the deterministic engine-core API skeleton
type: implementation
area: engine
priority: critical
status: approved
summary: >
  Create the authoritative engine-core package with the canonical entry points, deterministic hashing/filtering contracts, and invariant-backed bootstrap safety baseline.
spec_refs:
  - "15-implementation-kickoff.s006 (Step 2 - `@optcg/engine-core`)"
  - "01-system-architecture.s005 (`@optcg/engine-core`)"
  - 03-game-state-events-decisions.s020 (State hashing)
  - 03-game-state-events-decisions.s021 (Invariant hooks)
  - 11-testing-quality.s008 (Invariant tests)
scope:
  - "create packages/engine-core with the canonical createInitialState, getLegalActions, applyAction, resumeDecision, computeView, filterStateForPlayer, and hashGameState exports"
  - "establish a deterministic server-only GameState / EngineResult skeleton with state sequencing, event journal plumbing, and hidden-zone-safe filtering entry points"
  - implement deterministic hashGameState and baseline filterStateForPlayer behavior for the canonical contracts
  - wire invariant assertions into engine test mode and preserve the server-only package boundary
non_scope:
  - deterministic setup, opening-hand, mulligan, and life-placement flow (ENG-007)
  - turn-engine first-turn restrictions and draw/DON phase semantics beyond the bootstrap boundary (ENG-010)
  - DON attach/return mechanics (ENG-011)
  - non-mulligan PendingDecision runtime and generic decision progression (ENG-015)
  - main-phase play/attach/attack legality and vanilla combat/damage completion flows (ENG-012, ENG-013)
  - full non-vanilla effect runtime behavior
  - websocket room management
  - browser-safe presentation helpers
dependencies:
  - INF-001
  - CON-001
acceptance_criteria:
  - packages/engine-core exports the canonical engine entry points named in the kickoff contract
  - hashGameState is stable across repeated runs with the same seed and action log
  - "filterStateForPlayer omits opponent hand, deck order, face-down life, rng state, and effect queue internals"
  - "the engine package does not import browser, websocket, database, or live Poneglyph code"
required_tests:
  - invariant regression covering post-action and post-decision state checks
  - state hash stability test for repeated seed and action-log playback
  - hidden-information regression for filterStateForPlayer output
repo_rules:
  - must pass pnpm verify
  - must preserve package boundary enforcement
  - must not introduce hidden-information leakage
ambiguity_policy: fail_and_escalate
agent:
  packet_path: agent-packets/approved/ENG-001.packet.md
  implementation_skill: spec-story-implementation
  review_skill: spec-story-review
